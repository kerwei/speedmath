# 部署流水线 (bùshǔ liúshuǐxiàn — deploy to Aliyun ECS)
name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  XMAKE_VERSION: '3.0.0'
  NODE_VERSION: '20'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    environment: PROD

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: ${{ env.XMAKE_VERSION }}

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

    - name: Run C++ tests
      run: xmake build tests && xmake run tests

  build:
    name: Build
    runs-on: ubuntu-latest
    environment: PROD
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: ${{ env.XMAKE_VERSION }}

    - name: Cache xmake build
      uses: actions/cache@v4
      with:
        path: |
          .xmake
          build
        key: ${{ runner.os }}-xmake-${{ hashFiles('xmake.lua', 'libspeedmath/*.cpp', 'libspeedmath/*.h', 'backend/*.cpp') }}

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

    - name: Build backend
      run: xmake build backend

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build frontend
      run: |
        cd frontend
        npm ci
        npm run build

    - name: Package artifacts
      run: |
        mkdir -p frontend/dist
        tar czf /tmp/speedmath-deploy.tar.gz \
          build/linux/x86_64/release/backend \
          deploy/speedmath.service \
          deploy/nginx.conf \
          frontend/dist

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: speedmath-build
        path: /tmp/speedmath-deploy.tar.gz

  deploy:
    name: Deploy to Alibaba Cloud
    runs-on: ubuntu-latest
    environment: PROD
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: speedmath-build
        path: .

    - name: DNS resolution check
      run: |
        # 域名解析检查 (yùmíng jiěxī jiǎnchá — domain resolution check)
        DOMAIN="${{ secrets.DOMAIN_NAME }}"
        ECS_IP="${{ secrets.ECS_SSH_HOST }}"

        if [ -z "$DOMAIN" ]; then
          echo "WARNING: DOMAIN_NAME secret not set — skipping DNS check"
          exit 0
        fi

        echo "Resolving $DOMAIN ..."
        RESOLVED_IP=$(dig +short "$DOMAIN" | tail -1)

        if [ -z "$RESOLVED_IP" ]; then
          echo "ERROR: $DOMAIN does not resolve to any IP"
          exit 1
        fi

        echo "  Resolved: $RESOLVED_IP"
        echo "  Expected: $ECS_IP"

        if [ "$RESOLVED_IP" != "$ECS_IP" ]; then
          echo "ERROR: Domain $DOMAIN resolves to $RESOLVED_IP, but ECS host is $ECS_IP"
          echo "  Update your DNS A record to point to $ECS_IP before deploying."
          exit 1
        fi

        echo "✓ DNS check passed — $DOMAIN → $ECS_IP"

    - name: Copy deployment files to server
      uses: appleboy/scp-action@v0.1.3
      with:
        host: ${{ secrets.ECS_SSH_HOST }}
        username: root
        key: ${{ secrets.ECS_SSH_KEY }}
        source: "speedmath-deploy.tar.gz"
        target: "/opt/speedmath/"

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v0.1.8
      with:
        host: ${{ secrets.ECS_SSH_HOST }}
        username: root
        key: ${{ secrets.ECS_SSH_KEY }}
        script: |
          set -e
          cd /opt/speedmath

          # ── Step 1: check if service is running ──
          if systemctl is-active --quiet speedmath 2>/dev/null; then
            SERVICE_WAS_RUNNING=true
            echo "Service is running"
          else
            SERVICE_WAS_RUNNING=false
            echo "Service is not running"
          fi

          # ── Step 2: shut down service ──
          systemctl stop speedmath 2>/dev/null || true
          echo "Service stopped"

          # ── Step 3: deploy ──
          # Backup DB (keep last 3)
          if [ -f speedmath.db ]; then
            mkdir -p backups
            cp speedmath.db "backups/speedmath-$(date +%Y%m%d-%H%M%S).db"
            ls -t backups/speedmath-*.db | tail -n +4 | xargs rm -f 2>/dev/null || true
          fi
          # Extract new binary
          tar xzf speedmath-deploy.tar.gz
          chmod +x build/linux/x86_64/release/backend

          # ── Step 4: cleanup ──
          cp build/linux/x86_64/release/backend backend
          rm -rf build speedmath-deploy.tar.gz
          chown -R speedmath:speedmath backend frontend
          echo "Deploy artifacts cleaned up"

          # ── Step 5: test nginx config and reload ──
          if [ -f /etc/nginx/conf.d/speedmath.conf ]; then
            echo "Testing nginx configuration..."
            nginx -t
            systemctl reload nginx || systemctl restart nginx
            echo "nginx reloaded"
          else
            echo "WARNING: /etc/nginx/conf.d/speedmath.conf not found — skipping nginx reload"
            echo "  Run deploy/setup-ecs.sh <domain> on the ECS to set up nginx"
          fi

          # ── Step 6: bring service back online ──
          systemctl daemon-reload
          systemctl enable speedmath
          systemctl restart speedmath
          echo "Service restarted"

    - name: Verify deployment
      uses: appleboy/ssh-action@v0.1.8
      with:
        host: ${{ secrets.ECS_SSH_HOST }}
        username: root
        key: ${{ secrets.ECS_SSH_KEY }}
        script: |
          set -e
          DOMAIN="${{ secrets.DOMAIN_NAME }}"

          echo "=== Service status ==="
          systemctl status speedmath --no-pager | head -10

          echo ""
          echo "=== nginx status ==="
          systemctl status nginx --no-pager | head -10

          echo ""
          echo "=== Local backend health check (via nginx) ==="
          sleep 1
          curl -sf http://127.0.0.1:8080/api/auth/login -d "email=test@speedmath.local&password=000000" | head -c 100

          echo ""
          echo "=== Local frontend check (via nginx) ==="
          curl -sf http://127.0.0.1:8080 | head -c 200

          if [ -n "$DOMAIN" ]; then
            echo ""
            echo "=== External HTTPS check for $DOMAIN ==="
            # Check SSL certificate validity
            echo | openssl s_client -connect "$DOMAIN:443" -servername "$DOMAIN" 2>/dev/null \
              | openssl x509 -noout -dates 2>/dev/null || echo "  SSL check failed (certbot may not be configured yet)"
            # Check HTTPS API
            curl -sf "https://$DOMAIN/api/auth/login" \
              -d "email=test@speedmath.local&password=000000" \
              --connect-timeout 5 | head -c 100
            echo ""
            echo "=== Domain check complete ==="
          else
            echo ""
            echo "SKIP: DOMAIN_NAME not set — skipping external HTTPS checks"
          fi

          echo ""
          echo "=== Deploy complete ==="
